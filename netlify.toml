[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/weather/*"
  to = "/.netlify/functions/weather"
  status = 200

[[redirects]]
  from = "/api/geo/*"
  to = "/.netlify/functions/geo"
  status = 200

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
